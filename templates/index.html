<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCASS数据查询</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/material_green.css">
    
    <style>
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #f0f2f5;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container-card {
            max-width: 900px;
            width: 100%;
            background-color: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.05);
            padding: 40px;
        }
        h1 {
            text-align: center;
            margin-bottom: 35px;
            color: #1a1a1a;
            font-weight: 800;
            letter-spacing: -1px;
        }
        
        .search-controls {
            display: flex;
            flex-direction: column;
            gap: 24px;
            margin-bottom: 35px;
        }
        
        .date-input-group {
            max-width: 350px;
        }
        
        .date-input-group label {
            font-weight: 700;
            color: #444;
            margin-bottom: 12px;
            display: block;
            font-size: 0.95rem;
        }

        /* 优化输入框：现在它更像一个高级组件 */
        #datepicker {
            height: 52px;
            cursor: pointer;
            background-color: #fff;
            border: 2px solid #edf2f7;
            border-radius: 14px;
            padding: 0 16px;
            font-size: 1.1rem;
            font-weight: 500;
            color: #2d3748;
            transition: all 0.2s ease;
        }
        
        #datepicker:focus {
            border-color: #48bb78;
            box-shadow: 0 0 0 4px rgba(72, 187, 120, 0.1);
            outline: none;
        }

        .button-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }

        .btn {
            padding: 0 28px;
            border-radius: 12px;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            height: 52px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: none;
        }

        .btn-success { background-color: #48bb78; color: white; }
        .btn-success:hover { background-color: #38a169; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(72, 187, 120, 0.3); }

        .btn-primary { background-color: #4299e1; }
        .btn-primary:hover { background-color: #3182ce; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(66, 153, 225, 0.3); }

        .btn-secondary { background-color: #edf2f7; color: #4a5568; }
        .btn-secondary:hover { background-color: #e2e8f0; color: #2d3748; }

        /* 加载状态美化 */
        .loading {
            display: none;
            text-align: center;
            padding: 25px;
            background: #f9fffb;
            border-radius: 16px;
            border: 2px solid #e6fffa;
            margin-bottom: 25px;
        }

        .table-container {
            margin-top: 30px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #edf2f7;
        }
        
        .table thead { background-color: #f7fafc; }
        .table th { border-bottom-width: 1px; color: #718096; font-size: 0.85rem; text-transform: uppercase; padding: 15px; }

        /* 自定义日历弹窗的一些微调 */
        .flatpickr-calendar {
            box-shadow: 0 10px 30px rgba(0,0,0,0.1) !important;
            border: none !important;
            border-radius: 15px !important;
        }
    </style>
</head>
<body>
    <div class="container-card">
        <h1>CCASS 数据查询</h1>
        
        <div class="search-controls">
            <div class="date-input-group">
                <label for="datepicker">选择查询日期</label>
                <input type="text" id="datepicker" class="form-control" placeholder="点击选择日期...">
            </div>
            
            <div class="button-row">
                <button type="button" class="btn btn-success" id="submit-date-btn">立即查询</button>
                <button type="button" class="btn btn-primary" id="yesterday-btn">查询昨日数据</button>
                <button type="button" class="btn btn-secondary" id="cancel-btn">取消</button>
            </div>
        </div>

        <div class="loading" id="loading-spinner">
            <div class="spinner-border text-success" role="status"></div>
            <p class="mt-2 mb-0 fw-bold" style="color: #276749;">数据抓取中，请稍后...</p>
        </div>

        <div id="alert-container"></div>

        <div class="table-container">
            <table class="table table-hover mb-0" id="data-table">
                <thead id="table-header"></thead>
                <tbody id="table-body">
                    <tr><td colspan="5" class="text-center text-muted py-5">等待查询指令...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh.js"></script>
    
    <script>
        // 1. 初始化 Flatpickr 日历
        const fp = flatpickr("#datepicker", {
            locale: "zh",
            dateFormat: "Y/m/d",
            defaultDate: "today",
            disableMobile: "true", // 强制在手机上也使用这个美化版的日历
            animate: true
        });

        const alertBox = document.getElementById('alert-container');
        const loading = document.getElementById('loading-spinner');
        let controller = null;

        function showMsg(text, type='info') {
            alertBox.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show border-0 shadow-sm" role="alert">
                    ${text}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>`;
        }

        function renderTable(data) {
            const head = document.getElementById('table-header');
            const body = document.getElementById('table-body');
            head.innerHTML = ''; body.innerHTML = '';
            if (!data || data.length === 0) return;

            const trH = document.createElement('tr');
            data[0].forEach(text => {
                const th = document.createElement('th');
                th.textContent = text;
                trH.appendChild(th);
            });
            head.appendChild(trH);

            data.slice(1).forEach(row => {
                const tr = document.createElement('tr');
                row.forEach(cell => {
                    const td = document.createElement('td');
                    td.textContent = cell;
                    tr.appendChild(td);
                });
                body.appendChild(tr);
            });
        }

        async function startQuery(targetDate) {
            if (controller) controller.abort();
            controller = new AbortController();
            
            loading.style.display = 'block';
            showMsg(`正在检索 ${targetDate} 数据...`, 'primary');

            try {
                const response = await fetch('/api/data', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ date: targetDate }),
                    signal: controller.signal
                });
                
                const result = await response.json();
                loading.style.display = 'none';

                if (result.success) {
                    renderTable(result.data);
                    showMsg("数据加载成功！" + result.message, 'success');
                } else {
                    showMsg(`错误：${result.message}`, 'danger');
                }
            } catch (err) {
                loading.style.display = 'none';
                if (err.name === 'AbortError') showMsg('查询已取消', 'secondary');
                else showMsg('网络异常: ' + err.message, 'danger');
            }
        }

        // 按钮点击逻辑
        document.getElementById('submit-date-btn').onclick = () => {
            const date = document.getElementById('datepicker').value;
            if (date) startQuery(date);
        };

        document.getElementById('yesterday-btn').onclick = () => {
            const d = new Date();
            d.setDate(d.getDate() - 1);
            // 更新 Flatpickr 并触发查询
            fp.setDate(d);
            startQuery(document.getElementById('datepicker').value);
        };

        document.getElementById('cancel-btn').onclick = () => {
            // 中止前端网络请求
            if (controller) controller.abort();
            loading.style.display = 'none';
            showMsg('查询已取消', 'secondary');
        };
    </script>
</body>
</html>
