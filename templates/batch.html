<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCASS 数据批量查询</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/flatpickr.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/material_green.css') }}">
    
    <style>
        :root {
            --primary-color: #10b981;
            --primary-hover: #059669;
            --bg-color: #f8fafc;
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04), 0 8px 10px -6px rgba(0, 0, 0, 0.04);
        }

        body {
            font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            color: #1e293b;
            padding: 40px 20px;
        }

        .main-card {
            max-width: 900px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            border: 1px solid #f1f5f9;
            padding: 40px;
        }

        .terminal-header {
            border-bottom: 2px solid #f1f5f9;
            margin-bottom: 35px;
            padding-bottom: 20px;
        }

        .terminal-header h1 {
            font-size: 1.6rem;
            font-weight: 800;
            margin: 0;
            color: #0f172a;
            text-align: center;
        }

        .input-group-custom label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: #475569;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .form-control-custom {
            height: 52px;
            border-radius: 14px;
            border: 2px solid #edf2f7;
            padding: 0 18px;
            font-size: 1rem;
            transition: all 0.2s;
            width: 100%;
            background-color: #fcfcfc;
        }

        .form-control-custom:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
            background-color: #fff;
        }

        .btn-action {
            height: 52px;
            border-radius: 14px;
            padding: 0 32px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
            border: none;
        }

        .btn-query { background-color: var(--primary-color); color: white; }
        .btn-query:hover { background-color: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 8px 15px rgba(16, 185, 129, 0.2); }

        .table-wrapper {
            margin-top: 30px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #f1f5f9;
        }

        .table thead { background-color: #f8fafc; }
        .table th { font-size: 0.8rem; color: #64748b; padding: 18px; border-bottom: 2px solid #f1f5f9; }
        .table td { padding: 16px; font-size: 0.95rem; }

        .loading-box {
            display: none;
            background: #f0fdf4;
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            border: 1px solid #dcfce7;
            margin-bottom: 25px;
        }
    </style>
</head>
<body>

<div class="main-card">
    <div class="terminal-header">
        <h1>CCASS 数据批量查询</h1>
    </div>

    <div class="row g-4">
        <div class="col-12">
            <div class="input-group-custom">
                <label for="stock-code">股票代码</label>
                <input type="text" id="stock-code" class="form-control-custom" placeholder="输入5位代码，如 02158">
            </div>
        </div>

        <div class="col-md-6">
            <div class="input-group-custom">
                <label for="start-date">开始日期</label>
                <input type="text" id="start-date" class="form-control-custom" placeholder="选择起始日期...">
            </div>
        </div>
        <div class="col-md-6">
            <div class="input-group-custom">
                <label for="end-date">结束日期</label>
                <input type="text" id="end-date" class="form-control-custom" placeholder="选择截止日期...">
            </div>
        </div>

        <div class="col-12">
            <div class="input-group-custom">
                <label for="file-path">文件存储路径</label>
                <input type="text" id="file-path" class="form-control-custom" placeholder="例如: D:\Data\CCASS">
            </div>
        </div>

        <div class="col-12">
            <div class="d-flex flex-wrap gap-3 justify-content-between align-items-center">
                <button id="submit-batch-btn" class="btn-action btn-query">执行批量任务</button>
                <a href="/" class="btn btn-outline-secondary rounded-pill px-4 shadow-sm d-flex align-items-center" style="height: 44px; border-width: 2px; font-weight: 600; text-decoration: none;">
                    返回单日查询
                </a>
            </div>
        </div>
    </div>

    <hr class="my-5" style="border-color: #f1f5f9; opacity: 1;">

    <div id="loading-spinner" class="loading-box">
        <div class="spinner-grow text-success" role="status" style="width: 1.2rem; height: 1.2rem;"></div>
        <span class="ms-3 fw-bold text-success">正在执行批量任务，请勿关闭页面...</span>
    </div>

    <div id="alert-container"></div>

    <div class="table-wrapper">
        <table class="table table-hover mb-0" id="data-table">
            <thead id="table-header"></thead>
            <tbody id="table-body">
                <tr>
                    <td colspan="5" class="text-center py-5 text-muted">
                        配置完参数后点击“执行批量任务”开始采集
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="{{ url_for('static', filename='js/flatpickr.min.js') }}"></script>
<script src="{{ url_for('static', filename='js/zh.js') }}"></script>

<script>
    const startFp = flatpickr("#start-date", {
        locale: "zh",
        dateFormat: "Y/m/d",
        defaultDate: new Date().setDate(new Date().getDate() - 7),
        animate: true
    });
    
    const endFp = flatpickr("#end-date", {
        locale: "zh",
        dateFormat: "Y/m/d",
        defaultDate: "today",
        animate: true
    });

    const alertBox = document.getElementById('alert-container');
    const loading = document.getElementById('loading-spinner');
    let controller = null;

    const stockInput = document.getElementById('stock-code');
    const pathInput = document.getElementById('file-path');

    [ ['stockCode', stockInput], ['filePath', pathInput] ].forEach(([key, el]) => {
        el.value = localStorage.getItem(key) || (key === 'filePath' ? '.' : '');
        el.addEventListener('input', () => localStorage.setItem(key, el.value));
    });

    function showMsg(text, type='info') {
        alertBox.innerHTML = `
            <div class="alert alert-${type} border-0 shadow-sm alert-dismissible fade show" role="alert">
                ${text}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>`;
    }

    async function startBatchQuery() {
        if (controller) controller.abort();
        controller = new AbortController();
        
        const startDate = document.getElementById('start-date').value;
        const endDate = document.getElementById('end-date').value;
        const stockCode = stockInput.value;
        const filePath = pathInput.value;
        
        if (!stockCode.trim()) return showMsg('请输入股票代码', 'warning');
        if (!startDate || !endDate) return showMsg('请选择完整的日期范围', 'warning');
        
        loading.style.display = 'block';
        showMsg(`正在采集 ${startDate} 至 ${endDate} 的数据...`, 'primary');

        try {
            const response = await fetch('/api/batch', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    start_date: startDate, 
                    end_date: endDate, 
                    file_path: filePath, 
                    stock_code: stockCode 
                }),
                signal: controller.signal
            });
            
            const result = await response.json();
            loading.style.display = 'none';

            if (result.success) {
                showMsg(`批量采集任务完成！`, 'success');
            } else {
                showMsg(`任务中断：${result.message}`, 'danger');
            }
        } catch (err) {
            loading.style.display = 'none';
            if (err.name !== 'AbortError') showMsg(`系统异常：${err.message}`, 'danger');
        }
    }

    document.getElementById('submit-batch-btn').onclick = startBatchQuery;
</script>

</body>
</html>
