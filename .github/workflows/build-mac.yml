name: Build Intel Mac App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    # 使用 macOS 13 (Intel 架构)
    runs-on: macos-13

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'x64'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pyinstaller numpy

      - name: Build Intel Binary
        run: |
          # Mac/Linux 下 --add-data 必须使用冒号 (:) 分隔
          pyinstaller --noconfirm --onefile --windowed \
            --add-data "static:static" \
            --add-data "templates:templates" \
            --target-arch x86_64 \
            --name "CCASS_Tool" \
            app.py

      - name: Zip the .app bundle (关键修复)
        run: |
          # 直接通过 GitHub Actions 上传 .app 文件夹会破坏 Mac 的特殊文件权限和符号链接，导致 App 损坏无法打开。
          # 必须先将其压缩为 zip 文件。
          cd dist
          zip -r CCASS_Tool-Intel-Mac.zip CCASS_Tool.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CCASS-Intel-Mac
          path: dist/CCASS_Tool-Intel-Mac.zip
