name: Build Intel Mac App (x86_64)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    # 用 GitHub 原生 Intel runner，确保 x86_64 环境
    runs-on: macos-15-intel

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python (Intel x64)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10.14'  # 稳定版 3.10，避免兼容性问题
          architecture: 'x64'

      - name: Install dependencies (升级 PyInstaller 到最新版)
        run: |
          python -m pip install --upgrade pip
          # 关键：升级 PyInstaller 到最新版，支持新参数
          pip install --upgrade pyinstaller numpy
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build x86_64 Binary (修复参数问题)
        run: |
          # 方案A：如果升级后仍报错，去掉 --osx-min-version，用兼容写法
          pyinstaller --noconfirm --onefile --windowed \
            --add-data "static:static" \
            --add-data "templates:templates" \
            --target-arch x86_64 \
            --name "CCASS_Tool" \
            app.py
          
          # 方案B：如果 PyInstaller 已升级到 6.x+，参数名改为 --macos-min-version
          # pyinstaller --noconfirm --onefile --windowed \
          #   --add-data "static:static" \
          #   --add-data "templates:templates" \
          #   --target-arch x86_64 \
          #   --macos-min-version 11.0 \
          #   --name "CCASS_Tool" \
          #   app.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CCASS-Intel-Mac
          path: dist/CCASS_Tool.app
