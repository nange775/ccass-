name: Build macOS App

# 触发条件：当你推送代码到 main 分支，或者在网页上手动点击运行时触发
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest # 告诉 GitHub 分配一台最新的 Mac 虚拟机

    steps:
    - name: 获取最新代码
      uses: actions/checkout@v3

    - name: 配置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10' # 如果你用的是 3.9 或 3.11，可以改这里

    - name: 安装依赖包
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: 执行 PyInstaller 打包
      run: |
        # 注意 Mac 下附加数据路径的分隔符必须是冒号 :
        pyinstaller -F --add-data "templates:templates" --add-data "static:static" app.py

    - name: 上传打包结果 (Artifact)
      uses: actions/upload-artifact@v3
      with:
        name: mac-ccass-app
        path: dist/ # 将生成的 dist 文件夹打包供你下载
