name: Build Intel Mac App (Rosetta Compatible)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15-intel  # GitHub原生Intel runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python (x64)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10.14'
          architecture: 'x64'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade pyinstaller numpy  # 关键：升级PyInstaller解决符号缺失
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build x86_64 Binary
        run: |
          pyinstaller --noconfirm --onefile --windowed \
            --add-data "static:static" \
            --add-data "templates:templates" \
            --target-arch x86_64 \
            --osx-min-version 11.0 \  # 解决_mkfifoat符号问题
            --name "CCASS_Tool" \
            app.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CCASS-Intel-Mac
          path: dist/CCASS_Tool.app
