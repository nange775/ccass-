name: 打包格隆汇工具 (Intel+Apple双兼容版)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    # 使用 macOS 13 (Intel 核心) 来构建通用包通常最稳妥
    runs-on: macos-13 

    steps:
    - name: 1. 获取代码
      uses: actions/checkout@v4

    - name: 2. 配置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        # 核心：安装支持双架构的库（如果有的话）
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: 4. 执行通用打包 (Universal 2)
      run: |
        # 增加 --target-arch universal2 参数
        # 这会让 PyInstaller 同时生成两套指令并封装在一起
        pyinstaller -F \
          --target-arch universal2 \
          --add-data "templates:templates" \
          --add-data "static:static" \
          --add-data "settings.json:." \
          app_broker.py

    - name: 5. 上传成品
      uses: actions/upload-artifact@v4
      with:
        name: Gelonghui-Mac-Universal-App
        path: dist/app_broker
