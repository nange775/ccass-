name: Build macOS App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 获取最新代码
      uses: actions/checkout@v4 # 升级到 v4

    - name: 配置 Python 环境
      uses: actions/setup-python@v5 # 升级到 v5
      with:
        python-version: '3.10'

    - name: 安装依赖包
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: 执行 PyInstaller 打包
      run: |
        # 请再次确认你的主程序名是 app.py 还是 hkex_all.py
        # 如果是 hkex_all.py，请把下面这一行的 app.py 改掉
        pyinstaller -F --add-data "templates:templates" --add-data "static:static" app.py

    - name: 上传打包结果 (Artifact)
      uses: actions/upload-artifact@v4 # 关键点：这里必须是 v4
      with:
        name: mac-ccass-app
        path: dist/
