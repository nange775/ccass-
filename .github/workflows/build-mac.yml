name: Build macOS App for CCASS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    # 依然使用最新服务器，但后面会用命令强制兼容
    runs-on: macos-latest

    steps:
    - name: 1. 获取最新代码
      uses: actions/checkout@v4

    - name: 2. 配置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 安装依赖包
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: 4. 执行通用架构打包 (解决 Bad CPU Type)
      run: |
        # 核心改动：加入 --target-arch universal2
        # 注意：这里我暂时按你代码里的 app.py 打包
        # 如果你的主程序叫 hkex_all.py，请把下面最后一行的 app.py 改掉
        pyinstaller -F \
          --target-arch universal2 \
          --add-data "templates:templates" \
          --add-data "static:static" \
          app.py

    - name: 5. 上传打包结果
      uses: actions/upload-artifact@v4
      with:
        name: mac-ccass-universal-app
        path: dist/
