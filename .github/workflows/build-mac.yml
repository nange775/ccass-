name: Build CCASS Mac (Universal)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 1. 拉取源码
      uses: actions/checkout@v4

    - name: 2. 配置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 安装项目依赖
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        # 自动跳过可能导致 Mac 打包报错的 Windows 专属库
        if [ -f requirements.txt ]; then 
          grep -v "pywin32" requirements.txt > req_mac.txt
          pip install -r req_mac.txt
        fi

    - name: 4. 执行打包 (Intel+Apple双兼容)
      run: |
        # 核心：使用 app.py 作为入口，并封装静态资源
        pyinstaller -F \
          --target-arch universal2 \
          --add-data "templates:templates" \
          --add-data "static:static" \
          app.py

    - name: 5. 上传成品
      uses: actions/upload-artifact@v4
      with:
        name: CCASS-Mac-Universal
        path: dist/app
