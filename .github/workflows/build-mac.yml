name: Build Intel Mac Version

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    # 关键点 1: 必须使用 macos-13，它是 Intel 处理器。
    # macos-latest/14/15 默认是 Apple Silicon (M1/M2)，会导致架构冲突。
    runs-on: macos-13

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          # 关键点 2: 强制使用 x64 架构的 Python
          architecture: 'x64'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 如果你有 requirements.txt，请取消注释下一行
          # pip install -r requirements.txt
          pip install pyinstaller numpy  # 确保安装了 pyinstaller 和你的依赖

      - name: Build with PyInstaller
        run: |
          # 关键点 3: 明确指定 target-arch 为 x86_64
          # 如果你使用 .spec 文件，命令如下：
          pyinstaller --clean --target-arch x86_64 app.spec
          
          # 如果你直接打包 .py 文件，命令如下：
          # pyinstaller --clean --onefile --windowed --target-arch x86_64 your_script.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel-app
          path: dist/ # 假设打包结果在 dist 目录下
