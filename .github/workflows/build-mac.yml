name: Build Intel Mac App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    # 强制使用 Intel 芯片的 macOS 13 节点
    runs-on: macos-13

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          # 强制安装 x64 (Intel) 版本的 Python
          architecture: 'x64'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pyinstaller numpy

      - name: Build Intel Binary
        run: |
          # 关键点：直接从 app.py 打包，并手动添加 static 和 templates 文件夹
          # --target-arch x86_64 确保只打 Intel 版
          # --add-data 确保你的网页模板和静态文件被包含
          pyinstaller --noconfirm --onefile --windowed \
            --add-data "static:static" \
            --add-data "templates:templates" \
            --target-arch x86_64 \
            --name "CCASS_Tool" \
            app.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CCASS-Intel-Mac
          path: dist/CCASS_Tool.app # 或者 dist/CCASS_Tool (如果是 onefile 模式)
