name: Build Intel Mac App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    # 改用 GitHub 支持的 Intel 芯片 macOS 15 runner
    runs-on: macos-15-intel

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          # Intel runner 上默认就是 x64 架构，这里可以保留或省略
          architecture: 'x64'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pyinstaller numpy

      - name: Build Intel Binary
        run: |
          # 直接打包 Intel 版本，--target-arch x86_64 可保留以确保兼容性
          pyinstaller --noconfirm --onefile --windowed \
            --add-data "static:static" \
            --add-data "templates:templates" \
            --target-arch x86_64 \
            --name "CCASS_Tool" \
            app.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CCASS-Intel-Mac
          path: dist/CCASS_Tool.app
